name: Check Cuesta EMS 201

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test_email:
        description: "Send a standalone test email"
        required: false
        default: false
        type: boolean

jobs:
  check-course:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Send standalone test email
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_email == true }}
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage

          smtp_host = "smtp.gmail.com"
          smtp_port = 587
          smtp_user = os.environ["SMTP_USER"]
          smtp_pass = os.environ["SMTP_PASS"]
          alert_to = os.environ["ALERT_TO"]
          alert_from = os.environ.get("ALERT_FROM", smtp_user)

          msg = EmailMessage()
          msg["Subject"] = "TEST: Cuesta EMS watcher email is working"
          msg["From"] = alert_from
          msg["To"] = alert_to
          msg.set_content(
              "This is a direct GitHub Actions test email.\n\n"
              "If you received this, your GitHub Secrets and Gmail setup are working."
          )

          with smtplib.SMTP(smtp_host, smtp_port) as server:
              server.starttls()
              server.login(smtp_user, smtp_pass)
              server.send_message(msg)

          print("Standalone test email sent.")
          PY

      - name: Run checker
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
        run: python cuesta_ems201_watch.py
